<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MamRaj Web Studio</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }

        /* Admin Login Modal Overlay */
        #admin-login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(18, 27, 61, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-card h2 {
            color: #1E2A5A;
            margin-bottom: 8px;
            font-size: 24px;
        }

        .login-card p {
            color: #6B7280;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .login-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .login-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1E2A5A;
            margin-bottom: 6px;
        }

        .login-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #E8D8CF;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1E2A5A 0%, #7A5A7A 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-error {
            color: #e55353;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        /* Dashboard Container */
        .admin-dashboard-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
            display: none; /* Login se pehle Hidden */
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .admin-header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-logout {
            background: #e55353;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .admin-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        @media (min-width: 992px) {
            .admin-grid {
                display: grid;
                grid-template-columns: 320px 1fr;
                align-items: start;
            }
        }

        .admin-box {
            width: 100% !important;
            max-width: 100% !important;
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .admin-box h2 {
            font-size: 20px;
            color: #1E2A5A;
            margin-bottom: 20px;
            text-align: left;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .filter-controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .filter-controls input, 
        .filter-controls select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .table-responsive { width: 100%; overflow-x: auto; }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .admin-table th, .admin-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        .admin-table th { background-color: #1E2A5A; color: white; font-weight: 600; }
        .action-btns { display: flex; gap: 8px; }
        .btn-approve { background-color: #2eb85c; color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-reject { background-color: #e55353; color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-delete { background-color: #3c4b64; color: white; padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Admin Authentication Modal -->
    <div id="admin-login-modal">
        <div class="login-card">
            <h2>Admin Login</h2>
            <p>Access Moderation Dashboard</p>

            <form id="admin-login-form">
                <div class="login-group">
                    <label>Admin Email</label>
                    <input type="email" id="admin-email" placeholder="admin@example.com" required>
                </div>
                <div class="login-group">
                    <label>Password</label>
                    <input type="password" id="admin-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Login to Dashboard</button>
                <div id="login-error-msg" class="login-error">Invalid Email or Password</div>
            </form>
        </div>
    </div>

    <!-- Main Dashboard Container (Visible Only After Auth) -->
    <div class="admin-dashboard-container" id="admin-dashboard">
        
        <div class="admin-header">
            <div>
                <h1>Admin Moderation Dashboard</h1>
                <p>Manage, Moderate and Curate Client Reviews</p>
            </div>
            <div class="admin-header-actions">
                <a href="index.html" class="btn" style="width: auto; text-decoration: none;">Go to Website</a>
                <button class="btn-logout" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </div>

        <div class="admin-grid">
            <div class="admin-box">
                <h2>Filter & Moderation Tools</h2>
                <div class="filter-controls">
                    <input type="text" id="admin-search" placeholder="Search by name, email, review...">
                    
                    <select id="filter-status">
                        <option value="all">All Statuses</option>
                        <option value="approved">Approved</option>
                        <option value="pending">Pending</option>
                        <option value="rejected">Rejected</option>
                    </select>

                    <select id="filter-rating">
                        <option value="all">All Ratings</option>
                        <option value="5">5 Stars</option>
                        <option value="4">4 Stars</option>
                        <option value="3">3 Stars</option>
                        <option value="2">2 Stars</option>
                        <option value="1">1 Star</option>
                    </select>

                    <select id="filter-sort">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </div>

            <div class="admin-box">
                <h2>All Reviews Under Management</h2>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>User Details</th>
                                <th>Rating</th>
                                <th>Review</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="admin-reviews-body">
                            <!-- Dynamic Content -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- Firebase Compat Libraries (App, Database, Auth) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    
    <script type="module" src="review.js"></script>
</body>
</html>
