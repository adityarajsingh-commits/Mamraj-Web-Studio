<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" conten<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Profile - MamRaj Web Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-card {
            max-width: 420px;
            margin: 60px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        .auth-card h2 { color: #1E2A5A; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-primary { width: 100%; padding: 12px; background: #1E2A5A; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .btn-primary:hover { background: #2b3d80; }
        .toggle-link { display: inline-block; margin-top: 15px; color: #C58B73; cursor: pointer; text-decoration: underline; font-size: 14px; }
        .user-info-box { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="auth-card">
    <!-- SECTION 1: LOGGED IN STATE -->
    <div id="profile-logged-in" style="display: none;">
        <h2>My Account</h2>
        <div class="user-info-box">
            <p><strong>Name:</strong> <span id="user-display-name">Loading...</span></p>
            <p><strong>Email:</strong> <span id="user-display-email">Loading...</span></p>
        </div>
        <button onclick="handleLogout()" class="btn-primary" style="background: #e63946;">Log Out</button>
    </div>

    <!-- SECTION 2: LOGIN / SIGN UP FORM -->
    <div id="profile-auth-form">
        <h2 id="auth-title">Log In</h2>
        <form id="auth-form-element">
            <div class="form-group" id="name-field-group" style="display: none;">
                <label>Full Name</label>
                <input type="text" id="auth-name-input" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="auth-email-input" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="auth-password-input" placeholder="Enter password" required>
            </div>
            <button type="submit" id="auth-action-btn" class="btn-primary">Log In</button>
        </form>
        
        <span class="toggle-link" id="auth-toggle-link" onclick="toggleAuthMode()">Don't have an account? Sign Up</span>
    </div>
</div>

<!-- Firebase App & Auth SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
    // ⚠️ Replace this with your actual Firebase Console Credentials
    const firebaseConfig = {
        apiKey: "YOUR_FIREBASE_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();

    let isSignUpState = false;

    // Toggle Login <-> Sign Up
    function toggleAuthMode() {
        isSignUpState = !isSignUpState;
        document.getElementById("auth-title").innerText = isSignUpState ? "Sign Up" : "Log In";
        document.getElementById("auth-action-btn").innerText = isSignUpState ? "Create Account" : "Log In";
        document.getElementById("name-field-group").style.display = isSignUpState ? "block" : "none";
        document.getElementById("auth-toggle-link").innerText = isSignUpState ? "Already have an account? Log In" : "Don't have an account? Sign Up";
    }

    // Auth State Observer
    auth.onAuthStateChanged((user) => {
        if (user) {
            // User Logged In State
            document.getElementById("profile-logged-in").style.display = "block";
            document.getElementById("profile-auth-form").style.display = "none";
            document.getElementById("user-display-name").innerText = user.displayName || "User";
            document.getElementById("user-display-email").innerText = user.email;
        } else {
            // User Logged Out State
            document.getElementById("profile-logged-in").style.display = "none";
            document.getElementById("profile-auth-form").style.display = "block";
        }
    });

    // Form Submit Handler
    document.getElementById("auth-form-element").addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("auth-email-input").value.trim();
        const password = document.getElementById("auth-password-input").value.trim();
        const name = document.getElementById("auth-name-input").value.trim();

        if (isSignUpState) {
            auth.createUserWithEmailAndPassword(email, password)
                .then((cred) => cred.user.updateProfile({ displayName: name }))
                .then(() => {
                    alert("Account created successfully!");
                    window.location.href = "cart.html";
                })
                .catch(err => alert("Sign Up Error: " + err.message));
        } else {
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    alert("Logged in successfully!");
                    window.location.href = "cart.html";
                })
                .catch(err => alert("Login Error: " + err.message));
        }
    });

    // Logout Handler
    function handleLogout() {
        auth.signOut().then(() => alert("Logged out successfully!"));
    }
</script>

</body>
