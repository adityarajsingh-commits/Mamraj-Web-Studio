<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="style.css">
    <!-- Razorpay SDK Integration -->
    <script src="https://rzp.io/rzp/tQjwbit"></script>
</head>

<body>

<div class="cart-container">

    <h1>Your Cart</h1>

    <!-- Dynamic Cart Items Rendering Target -->
    <div id="cart-items"></div>

    <h2 id="total"></h2>

    <div class="checkout-container">
        <!-- Billing Details Form (Fixed to Professional English) -->
        <div class="billing-form">
            <h3>Billing Details</h3>
            <input type="text" id="userName" placeholder="Full Name" required>
            <input type="email" id="userEmail" placeholder="Email Address" required>
            <input type="tel" id="userPhone" placeholder="Mobile Number" required>
        </div>

        <!-- Total Area and Action Button (Dynamic Price Synchronization Fixed) -->
        <div class="checkout-summary">
            <h2>Total: ₹<span id="cart-total-val">0</span></h2>
            <a href="https://rzp.io/rzp/tQjwbit">Pay Now Securely</a>
        </div>
    </div>
</div>

<!-- Core Cart Logic Engine -->
<script src="cart.js"></script>

</body>
</html>
